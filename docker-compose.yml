services:
  neo4j:
    image: neo4j:5-enterprise
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: neo4j/ictgraphrag2024
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_memory_heap_max__size: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ict_graphrag
      POSTGRES_USER: ict_graphrag
      POSTGRES_PASSWORD: ictgraphrag2024
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ict_graphrag
      MINIO_ROOT_PASSWORD: ictgraphrag2024
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A src.ingestion.worker worker --loglevel=info
    environment:
      ICT_GRAPH_NEO4J_URI: bolt://neo4j:7687
      ICT_GRAPH_NEO4J_USER: neo4j
      ICT_GRAPH_NEO4J_PASSWORD: ictgraphrag2024
      ICT_GRAPH_REDIS_URL: redis://redis:6379/0
      ICT_GRAPH_POSTGRESQL_DSN: postgresql+asyncpg://ict_graphrag:ictgraphrag2024@postgres:5432/ict_graphrag
      ICT_GRAPH_DEBUG: "true"
    depends_on:
      - neo4j
      - redis
      - postgres
    volumes:
      - .:/app

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  postgres_data:
  redis_data:
  minio_data:
